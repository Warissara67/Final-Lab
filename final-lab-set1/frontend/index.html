<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Task Board — Final Lab</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>
body{
font-family:'Zen Kaku Gothic New',sans-serif;
background:#fdf6f0;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
margin:0;
}

.auth-box{
width:360px;
background:white;
padding:30px;
border-radius:16px;
box-shadow:0 10px 40px rgba(0,0,0,.08);
}

.auth-title{
font-size:24px;
text-align:center;
margin-bottom:10px;
}

.auth-subtitle{
text-align:center;
color:#777;
margin-bottom:25px;
}

.form-group{
margin-bottom:12px;
}

.input{
width:100%;
padding:10px;
border-radius:8px;
border:1px solid #ddd;
}

.btn{
width:100%;
padding:10px;
border:none;
border-radius:8px;
cursor:pointer;
margin-top:8px;
}

.btn-primary{
background:#e8789a;
color:white;
}

.btn-secondary{
background:#eee;
}

.hidden{
display:none;
}

.auth-msg{
margin-top:10px;
font-size:14px;
}

.auth-msg.error{color:red}
.auth-msg.success{color:green}

</style>
</head>

<body>

<!-- AUTH -->
<div id="auth-page">

<div class="auth-box">

<div class="auth-title">🌸 Task Board</div>
<div class="auth-subtitle">Final Lab Login / Register</div>

<!-- LOGIN -->
<div id="login-form">

<div class="form-group">
<label>Email</label>
<input id="login-email" class="input" type="email" placeholder="you@lab.local">
</div>

<div class="form-group">
<label>Password</label>
<input id="login-password" class="input" type="password">
</div>

<button class="btn btn-primary" onclick="doLogin()">
เข้าสู่ระบบ
</button>

<button class="btn btn-secondary" onclick="toggleRegister()">
สมัครสมาชิก
</button>

</div>

<!-- REGISTER -->
<div id="register-form" class="hidden">

<div class="form-group">
<label>Username</label>
<input id="reg-username" class="input" type="text">
</div>

<div class="form-group">
<label>Email</label>
<input id="reg-email" class="input" type="email">
</div>

<div class="form-group">
<label>Password</label>
<input id="reg-password" class="input" type="password">
</div>

<button class="btn btn-primary" onclick="doRegister()">
สมัครสมาชิก
</button>

<button class="btn btn-secondary" onclick="toggleRegister()">
กลับไป Login
</button>

</div>

<div id="auth-msg"></div>

</div>
</div>

<script>

const API = window.location.origin;

let token = localStorage.getItem("jwt_token")

function showAuthMsg(msg,type){
const el=document.getElementById("auth-msg")
el.className=`auth-msg ${type}`
el.textContent=msg
}


function toggleRegister(){

const login=document.getElementById("login-form")
const reg=document.getElementById("register-form")

login.classList.toggle("hidden")
reg.classList.toggle("hidden")

}

async function doLogin(){

const email=document.getElementById("login-email").value.trim()
const password=document.getElementById("login-password").value

if(!email||!password){
showAuthMsg("กรอกข้อมูลให้ครบ","error")
return
}

try{

const res=await fetch(`${API}/api/auth/login`,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({email,password})
})

const data=await res.json()

if(res.ok){

localStorage.setItem("jwt_token",data.token)

showAuthMsg("Login สำเร็จ","success")

location.reload()

}else{

showAuthMsg(data.error||"Login ไม่สำเร็จ","error")

}

}catch(err){

showAuthMsg("Server error","error")

}

}

async function doRegister(){

const username=document.getElementById("reg-username").value.trim()
const email=document.getElementById("reg-email").value.trim()
const password=document.getElementById("reg-password").value

if(!username||!email||!password){
showAuthMsg("กรอกข้อมูลให้ครบ","error")
return
}

try{

const res=await fetch(`${API}/api/auth/register`,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
username,
email,
password
})
})

const data=await res.json()

if(res.ok){

showAuthMsg("สมัครสมาชิกสำเร็จ 🌸","success")
toggleRegister()

}else{

showAuthMsg(data.error||"สมัครไม่สำเร็จ","error")

}

}catch(err){

showAuthMsg("Server error","error")

}

}

</script>

</body>
</html>
