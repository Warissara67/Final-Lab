<!DOCTYPE html>
<html lang="th">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Task Board — Final Lab</title>

<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
}

:root{

--bg:#f7f7fb;
--surface:#ffffff;
--surface2:#f3f4ff;

--border:#e5e7ff;
--border2:#dfe1ff;

--text:#333;
--muted:#7b7b95;

--blue:#7aa8ff;
--green:#6dd8b1;
--yellow:#ffd77b;
--red:#ff8c9d;

--accent:#caa6ff;

--radius:12px;

--sidebar-w:250px;

}

body{
font-family:'Nunito',sans-serif;
background:linear-gradient(135deg,#f6f7ff,#fff5fb);
color:var(--text);
height:100vh;
overflow:hidden;
}

.hidden{
display:none!important;
}

/* AUTH */

#auth-page{
display:flex;
align-items:center;
justify-content:center;
height:100%;
}

.auth-box{
width:400px;
background:var(--surface);
padding:40px;
border-radius:20px;
border:1px solid var(--border);
box-shadow:0 20px 40px rgba(0,0,0,0.08);
}

.auth-title{
font-family:'Poppins',sans-serif;
font-size:28px;
margin-bottom:5px;
}

.auth-subtitle{
font-size:14px;
color:var(--muted);
margin-bottom:25px;
}

.form-group{
margin-bottom:15px;
}

.form-group label{
font-size:13px;
font-weight:600;
}

.input{
width:100%;
padding:10px;
border-radius:10px;
border:1px solid var(--border);
font-family:'Nunito';
margin-top:4px;
}

.input:focus{
outline:none;
border-color:var(--accent);
}

.btn{
border:none;
cursor:pointer;
padding:10px 18px;
border-radius:10px;
font-family:'Poppins';
font-weight:600;
}

.btn-primary{
background:var(--accent);
color:white;
width:100%;
}

.btn-secondary{
background:var(--surface2);
}

.btn-danger{
background:#ffe2e6;
color:var(--red);
}

.btn-sm{
font-size:12px;
padding:6px 10px;
}

.auth-hint{
margin-top:20px;
font-size:12px;
background:#fafaff;
padding:10px;
border-radius:10px;
border:1px solid var(--border);
}

/* SIDEBAR */

.sidebar{
position:fixed;
left:0;
top:0;
bottom:0;
width:var(--sidebar-w);
background:var(--surface);
border-right:1px solid var(--border);
padding:20px;
display:flex;
flex-direction:column;
}

.sidebar-logo{
font-family:'Poppins';
font-size:20px;
margin-bottom:30px;
}

.nav-item{
display:flex;
align-items:center;
gap:10px;
padding:10px;
border-radius:10px;
cursor:pointer;
color:var(--muted);
border:1px solid transparent;
margin-bottom:5px;
background:none;
}

.nav-item:hover{
background:var(--surface2);
}

.nav-item.active{
background:#f3f0ff;
color:var(--accent);
border-color:#e9e6ff;
}

.badge-count{
margin-left:auto;
background:#f3f0ff;
padding:2px 7px;
border-radius:8px;
font-size:11px;
}

.sidebar-footer{
margin-top:auto;
}

.user-chip{
display:flex;
align-items:center;
gap:10px;
padding:10px;
border-radius:10px;
background:var(--surface2);
border:1px solid var(--border);
}

.user-avatar{
width:34px;
height:34px;
border-radius:8px;
background:var(--accent);
display:flex;
align-items:center;
justify-content:center;
color:white;
font-weight:700;
}

.role-pill{
font-size:11px;
padding:2px 6px;
border-radius:6px;
background:#f3f0ff;
}

/* MAIN */

.main-content{
margin-left:var(--sidebar-w);
padding:35px;
height:100vh;
overflow:auto;
}

.page-header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.page-header h2{
font-family:'Poppins';
font-size:26px;
}

.card{
background:var(--surface);
border-radius:15px;
padding:20px;
border:1px solid var(--border);
}

/* TABLE */

.table{
width:100%;
border-collapse:collapse;
font-size:14px;
}

.table th{
text-align:left;
padding:10px;
border-bottom:1px solid var(--border);
font-size:12px;
color:var(--muted);
}

.table td{
padding:12px 10px;
border-bottom:1px solid var(--border);
}

.task-title{
font-weight:600;
}

.task-desc{
font-size:12px;
color:var(--muted);
}

.badge{
padding:4px 10px;
border-radius:10px;
font-size:12px;
}

.badge-TODO{
background:#f2f2f7;
}

.badge-IN_PROGRESS{
background:#e6f0ff;
color:#507cff;
}

.badge-DONE{
background:#e8fff4;
color:#23a56f;
}

.badge-low{
background:#f4f4f4;
}

.badge-medium{
background:#fff2d7;
}

.badge-high{
background:#ffe5e9;
color:#ff4f6d;
}

/* MODAL */

.modal-backdrop{
position:fixed;
inset:0;
background:rgba(0,0,0,0.4);
display:flex;
align-items:center;
justify-content:center;
}

.modal{
width:450px;
background:white;
padding:25px;
border-radius:15px;
border:1px solid var(--border);
}

.modal-header{
display:flex;
justify-content:space-between;
margin-bottom:15px;
}

.modal-footer{
display:flex;
gap:10px;
justify-content:flex-end;
margin-top:15px;
}

textarea{
resize:none;
}

/* TOAST */

.toast{
position:fixed;
bottom:20px;
right:20px;
background:white;
padding:10px 15px;
border-radius:10px;
border:1px solid var(--border);
box-shadow:0 5px 20px rgba(0,0,0,0.08);
}

</style>
</head>

<body>

<!-- AUTH PAGE -->

<div id="auth-page">

<div class="auth-box">

<div class="auth-title">🌸 Task Board</div>

<div class="auth-subtitle">
Final Lab Login
</div>

<div id="login-form">

<div class="form-group">
<label>Email</label>
<input id="login-email" class="input" type="email" value="alice@lab.local">
</div>

<div class="form-group">
<label>Password</label>
<input id="login-password" class="input" type="password" value="alice123">
</div>

<button class="btn btn-primary" onclick="doLogin()">
Login
</button>

</div>

<div id="auth-msg"></div>

<div class="auth-hint">
<b>Seed Users</b><br>
alice@lab.local / alice123<br>
bob@lab.local / bob456<br>
admin@lab.local / adminpass
</div>

</div>

</div>

<!-- APP PAGE -->

<div id="app-page" class="hidden">

<nav class="sidebar">

<div class="sidebar-logo">
📋 TaskBoard
</div>

<button class="nav-item active" data-page="tasks" onclick="showPage('tasks')">
Tasks
<span class="badge-count" id="task-count">0</span>
</button>

<button class="nav-item" data-page="profile" onclick="showPage('profile')">
Profile
</button>

<a href="logs.html" class="nav-item">
Logs
</a>

<div class="sidebar-footer">

<div class="user-chip">
<div class="user-avatar" id="sidebar-avatar">?</div>

<div>
<div id="sidebar-name">—</div>
<span class="role-pill" id="sidebar-role-badge">—</span>
</div>

</div>

</div>

</nav>

<div class="main-content">

<div id="page-tasks">

<div class="page-header">
<h2>Task Board</h2>

<button class="btn btn-primary" onclick="openTaskModal()">
+ Create Task
</button>

</div>

<div class="card">

<table class="table">

<thead>
<tr>
<th>Title</th>
<th>Status</th>
<th>Priority</th>
<th>Owner</th>
<th>Updated</th>
<th></th>
</tr>
</thead>

<tbody id="tasks-body">
</tbody>

</table>

</div>

</div>

</div>

</div>

<script>

const API=''

let token=localStorage.getItem('jwt_token')

let currentUser=null

function doLogin(){
alert("เชื่อม API เหมือนเดิม")
}

</script>

</body>
</html>
